name: Supabase Keep Alive

# Ping REST endpoint Supabase tiap ~5 hari supaya project free-tier gak ke-pause
# karena idle. Bisa juga dijalankan manual lewat tab Actions (Run workflow).
#
# WAJIB set 2 GitHub Secrets dulu (repo -> Settings -> Secrets and variables -> Actions):
#   SUPABASE_URL       = https://xxxxx.supabase.co   (bare, TANPA /rest/v1)
#   SUPABASE_ANON_KEY  = <anon public key dari Supabase Settings -> API>

on:
  schedule:
    # menit jam hari-bulan bulan hari-minggu  -> tiap 5 hari sekali jam 06:00 UTC
    - cron: '0 6 */5 * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST
        run: |
          if [ -z "${{ secrets.SUPABASE_URL }}" ] || [ -z "${{ secrets.SUPABASE_ANON_KEY }}" ]; then
            echo "::error::Secrets SUPABASE_URL / SUPABASE_ANON_KEY belum di-set."
            exit 1
          fi
          # Query ringan ke tabel progress (limit 1). RLS bikin hasilnya kosong utk anon —
          # itu gak masalah, tujuannya cuma ngebangunin project biar gak idle.
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/progress?select=user_id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "HTTP status: $code"
          # 200 (atau 4xx RLS) artinya project hidup. 5xx/000 artinya bermasalah.
          if [ "$code" -ge 500 ] || [ "$code" -eq 000 ]; then
            echo "::error::Ping gagal (status $code)."
            exit 1
          fi
          echo "Supabase aktif. ✅"
